# Per-flash-version data ch32-metapac doesn't expose. Each top-level key maps
# 1:1 to an algo crate under algos/.
#
#   page_size  erase unit (also probe-rs ProgramPage chunk size)
#   word_size  BUFLOAD chunk pushed to the IP's internal write buffer
#   sys / opt  {addr, size} for system flash and option bytes regions
#   vnd        factory-locked read-only region; always covers ESIG
#
# User flash (`usr`) comes from ch32-metapac METADATA, not this file.

families:
  # CH32V003, CH641. Source: CH32V003RM v1.9 §15, §16.
  v0:
    page_size: 64
    word_size: 4
    sys:
      - addr: 0x1FFFF000
        size: 0x780 # 1920 B
    opt:
      addr: 0x1FFFF800
      size: 0x40 # 64 B
    vnd:
      addr: 0x1FFFF7E0
      size: 0x20 # 32 B — ESIG (FLACAP + UID)

  # CH32V002/4/5/6/7, CH32M007 — RV32EC + Zmmul. Source: CH32V00XRM §18, §19.
  # TODO: verify page_size/word_size — metapac says 64, tinyboot says 256.
  v00x:
    page_size: 64
    word_size: 4
    sys:
      - addr: 0x1FFF0000
        size: 0xD00 # 3328 B
    opt:
      addr: 0x1FFFF800
      size: 0x100 # 256 B
    vnd:
      addr: 0x1FFFF7E0
      size: 0x20 # 32 B — ESIG

  # CH32V103. Source: CH32x103 RM v2.0 §23, §24. System is *split* around the
  # OB and a locked vendor word at 0x1FFFF880 (128 B, not exposed).
  # TODO: verify page_size/word_size — tinyboot says 128/16, metapac says 256.
  v1:
    page_size: 128
    word_size: 16
    sys:
      - addr: 0x1FFFF000
        size: 0x800 # 2048 B — storage 1
      - addr: 0x1FFFF900
        size: 0x700 # 1792 B — storage 2
    opt:
      addr: 0x1FFFF800
      size: 0x80 # 128 B
    vnd:
      addr: 0x1FFFF7E0
      size: 0x20 # 32 B — ESIG

  # CH32V20x. Shares flash IP (flash_v3) with v3; split only for target
  # triple. Source: CH32F/V20x_V30x_V31x RM v2.5 §31, §32.
  v2:
    page_size: 256
    word_size: 4
    sys:
      - addr: 0x1FFF8000
        size: 0x7000 # 28 KB
    opt:
      addr: 0x1FFFF800
      size: 0x80 # 128 B
    vnd:
      addr: 0x1FFFF7E0
      size: 0x20 # 32 B — ESIG

  # CH32V30x — qingke-v4f (hardware float). Same flash layout as v2.
  v3:
    page_size: 256
    word_size: 4
    sys:
      - addr: 0x1FFF8000
        size: 0x7000 # 28 KB
    opt:
      addr: 0x1FFFF800
      size: 0x80 # 128 B
    vnd:
      addr: 0x1FFFF7E0
      size: 0x20 # 32 B — ESIG

  # CH32X0xx, CH643. Source: CH32X035RM §19, §20. vnd covers the 256 B
  # manufacturer configuration word that encloses ESIG.
  x0:
    page_size: 256
    word_size: 4
    sys:
      - addr: 0x1FFF0000
        size: 0xD00 # 3328 B
    opt:
      addr: 0x1FFFF800
      size: 0x100 # 256 B
    vnd:
      addr: 0x1FFFF700
      size: 0x100 # 256 B — manufacturer configuration word (incl. ESIG)

  # CH32L103. Source: CH32L103RM §24, §27. Same vnd shape as x0.
  l1:
    page_size: 256
    word_size: 4
    sys:
      - addr: 0x1FFF0000
        size: 0xD00 # 3328 B
    opt:
      addr: 0x1FFFF800
      size: 0x100 # 256 B
    vnd:
      addr: 0x1FFFF700
      size: 0x100 # 256 B — vendor configuration words (incl. ESIG)
